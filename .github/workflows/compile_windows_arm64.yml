name: Compile Windows ARM64

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"

jobs:
  build_windows_arm64:
    runs-on: windows-11-arm

    steps:
      - name: Fix long file paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check host architecture
        shell: pwsh
        run: |
          Write-Host "PROCESSOR_ARCHITECTURE: $env:PROCESSOR_ARCHITECTURE"
          Write-Host "PROCESSOR_ARCHITEW6432: $env:PROCESSOR_ARCHITEW6432"
          $arch = (Get-CimInstance -ClassName Win32_Processor).Architecture
          Write-Host "Win32 Processor Architecture: $arch"
          [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Check Flutter architecture
        shell: pwsh
        run: |
          dart --version
          flutter --version
          dart -e "print('Dart arch: ${dart:io.Platform.version}')"

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Compile for Windows
        working-directory: app
        run: flutter build windows

      - name: Check build output
        shell: pwsh
        working-directory: app
        run: |
          Write-Host "Checking build output directories:"
          if (Test-Path "build/windows/arm64/runner/Release") {
            Write-Host "ARM64 build output found"
            Get-ChildItem "build/windows/arm64/runner/Release"
          }
          if (Test-Path "build/windows/x64/runner/Release") {
            Write-Host "x64 build output found"
            Get-ChildItem "build/windows/x64/runner/Release"
          }
          Write-Host "All build directories:"
          Get-ChildItem "build/windows" -ErrorAction SilentlyContinue

      - name: Download ARM64 VC++ Redistributable DLLs
        shell: pwsh
        run: |
          # Download VC++ redistributable for ARM64
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.arm64.exe" -OutFile "$env:TEMP\vc_redist.arm64.exe"

          # Extract using dark.exe (WiX) or 7-zip, or try a simpler approach
          # Use the exe with /extract flag
          Start-Process -FilePath "$env:TEMP\vc_redist.arm64.exe" -ArgumentList "/extract:$env:TEMP\vc_arm64_extract /quiet" -Wait -NoNewWindow

          # Create DLL directory
          $dllDir = "app/scripts/windows/arm64"
          New-Item -ItemType Directory -Force -Path $dllDir

          # Find and copy DLLs
          $dlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          foreach ($dll in $dlls) {
            $found = Get-ChildItem -Path "$env:TEMP\vc_arm64_extract" -Recurse -Filter $dll -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName "$dllDir\$dll"
              Write-Host "Copied: $dll from $($found.FullName)"
            } else {
              Write-Host "WARNING: $dll not found"
            }
          }
          Get-ChildItem $dllDir

      - name: Package build output
        shell: pwsh
        working-directory: app
        run: |
          # Determine which architecture was built
          $arch = if (Test-Path "build/windows/arm64/runner/Release") { "arm64" } elseif (Test-Path "build/windows/x64/runner/Release") { "x64" } else { "unknown" }
          Write-Host "Detected build architecture: $arch"

          $releaseDir = "build/windows/$arch/runner/Release"

          # Add DLLs
          if (Test-Path "../scripts/windows/arm64") {
            Copy-Item ../scripts/windows/arm64/*.dll $releaseDir/ -ErrorAction SilentlyContinue
          }

          # Create settings.json
          echo {} > "$releaseDir/settings.json"

          # Zip
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "LocalSend-windows-$arch.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v6
        with:
          name: windows-arm64-result
          path: app/LocalSend-windows-*.zip
